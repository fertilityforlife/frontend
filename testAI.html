<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fertility Center Assistant</title>
</head>
<body>
    <h1>Chat with Our Fertility Assistant</h1>
    <textarea id="userInput"></textarea>
    <button onclick="sendMessage()">Send</button>
    <p>Assistant Response: <span id="assistantResponse"></span></p>

    <script>
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            const thread = localStorage.getItem('thread');  // Retrieve the thread ID from local storage

            const requestBody = { message: userInput };
            if (thread) {
                requestBody.thread = thread;  // Include the thread ID if it exists
            }

            const response = await fetch('http://127.0.0.1:5000/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            console.log(data);
            document.getElementById('chat-box').innerHTML += `<p>${data.response}</p>`;
            localStorage.setItem('thread', data.thread);  // Store the thread ID in local storage
        }
    </script>

</body>
</html>
